<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK-47 FPS</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Courier New, monospace;
}

#game{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
    cursor:none;
    background:#101510;
}

canvas{
    position:absolute;
    inset:0;
}

#crosshair{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    color:#00ff00;
    font-size:32px;
    z-index:50;
    pointer-events:none;
    text-shadow:0 0 10px #0f0;
}

.enemy{
    position:absolute;
    width:50px;
    height:100px;
    z-index:10;
}

.enemy .body{
    position:absolute;
    width:22px;
    height:40px;
    background:#4f6b3c;
    left:14px;
    top:28px;
    border-radius:4px;
}

.enemy .head{
    position:absolute;
    width:24px;
    height:24px;
    background:#c8956c;
    border-radius:50%;
    left:13px;
    top:4px;
}

.enemy .leg1,
.enemy .leg2{
    position:absolute;
    width:8px;
    height:30px;
    background:#3a3a3a;
    bottom:0;
}

.enemy .leg1{left:15px;}
.enemy .leg2{right:15px;}

#hud{
    position:absolute;
    top:15px;
    left:15px;
    color:#88ff88;
    z-index:100;
    line-height:1.8;
    text-shadow:0 0 6px #0f0;
}

#ammo{
    position:absolute;
    right:20px;
    bottom:20px;
    color:#fff;
    font-size:22px;
    z-index:100;
}

#gun{
    position:absolute;
    right:-30px;
    bottom:-10px;
    width:420px;
    height:240px;
    z-index:40;
    pointer-events:none;
    transition:transform 0.05s;
}

#msg{
    position:absolute;
    top:45%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:32px;
    z-index:200;
    opacity:0;
    transition:0.3s;
    text-shadow:0 0 20px #fff;
}

.hit{
    position:absolute;
    color:red;
    font-size:30px;
    font-weight:bold;
    z-index:200;
    animation:pop 0.4s forwards;
}

@keyframes pop{
    0%{
        transform:scale(1);
        opacity:1;
    }

    100%{
        transform:scale(2);
        opacity:0;
    }
}
</style>
</head>

<body>

<div id="game">

<canvas id="bg"></canvas>

<div id="crosshair">+</div>

<div id="hud">
    SCORE: <span id="score">0</span><br>
    HITS: <span id="hits">0</span><br>
    ROUND: <span id="round">1</span>
</div>

<div id="ammo">
    <span id="ammoCount">30</span> / 30
</div>

<div id="msg"></div>

<div id="gun">
<svg viewBox="0 0 390 260" width="390" height="260">
<g>
<rect x="66" y="128" width="218" height="33" rx="5" fill="#2a2a2a"/>
<rect x="260" y="117" width="76" height="18" rx="2" fill="#1a1a1a"/>
<rect x="334" y="119" width="32" height="14" rx="1" fill="#111"/>
<polygon points="158,161 192,161 186,208 152,208" fill="#222"/>
<ellipse cx="275" cy="215" rx="42" ry="25" fill="#b07545"/>
</g>
</svg>
</div>

</div>

<script>
const game=document.getElementById("game");
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

const scoreEl=document.getElementById("score");
const hitsEl=document.getElementById("hits");
const roundEl=document.getElementById("round");
const ammoEl=document.getElementById("ammoCount");
const msg=document.getElementById("msg");
const gun=document.getElementById("gun");

let score=0;
let hits=0;
let round=1;

let ammo=30;
let reloading=false;

let camX=1500;
let camY=0;

let targetCamX=1500;
let targetCamY=0;

const WORLD=3000;

const enemies=[];

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}

resize();

window.addEventListener("resize",resize);

function GW(){ return canvas.width; }
function GH(){ return canvas.height; }

function w2s(wx,wy){
    return [
        GW()/2+(wx-camX),
        GH()/2+(wy-camY)
    ];
}

function drawBackground(){

    const gw=GW();
    const gh=GH();

    ctx.clearRect(0,0,gw,gh);

    ctx.fillStyle="#0d120d";
    ctx.fillRect(0,0,gw,gh);

    ctx.fillStyle="#1f381f";
    ctx.fillRect(0,gh*0.5,gw,gh*0.5);

    for(let i=0;i<40;i++){

        const x=((i*300)-(camX*0.5)%300);

        ctx.fillStyle="#1c2c1c";

        ctx.fillRect(x,gh*0.35,40,200);

        ctx.beginPath();
        ctx.arc(x+20,gh*0.3,50,0,Math.PI*2);
        ctx.fill();
    }
}

function spawnEnemy(){

    const el=document.createElement("div");

    el.className="enemy";

    el.innerHTML=`
        <div class="head"></div>
        <div class="body"></div>
        <div class="leg1"></div>
        <div class="leg2"></div>
    `;

    game.appendChild(el);

    const enemy={

        el,

        x:Math.random()*WORLD,

        y:(Math.random()*700)-250,

        w:50,

        h:100
    };

    enemies.push(enemy);

    updateEnemy(enemy);
}

function updateEnemy(e){

    const [sx,sy]=w2s(e.x,e.y);

    e.el.style.left=sx+"px";
    e.el.style.top=sy+"px";
}

function updateEnemies(){

    enemies.forEach(updateEnemy);
}

function wave(){

    for(let i=0;i<5+round;i++){

        setTimeout(spawnEnemy,i*250);
    }
}

function flashMessage(text){

    msg.innerText=text;

    msg.style.opacity=1;

    setTimeout(()=>{
        msg.style.opacity=0;
    },1200);
}

function reload(){

    if(reloading || ammo===30) return;

    reloading=true;

    flashMessage("RELOADING");

    setTimeout(()=>{

        ammo=30;

        ammoEl.innerText=ammo;

        reloading=false;

    },1500);
}

function shoot(){

    if(reloading) return;

    if(ammo<=0){

        flashMessage("PRESS R");

        return;
    }

    ammo--;

    ammoEl.innerText=ammo;

    gun.style.transform="translateY(-20px) rotate(-5deg)";

    setTimeout(()=>{
        gun.style.transform="translateY(0px)";
    },70);

    const cx=GW()/2;
    const cy=GH()/2;

    for(let i=enemies.length-1;i>=0;i--){

        const e=enemies[i];

        const [sx,sy]=w2s(e.x,e.y);

        if(
            cx>=sx &&
            cx<=sx+e.w &&
            cy>=sy &&
            cy<=sy+e.h
        ){

            hits++;
            score+=10;

            hitsEl.innerText=hits;
            scoreEl.innerText=score;

            const hit=document.createElement("div");

            hit.className="hit";

            hit.innerText="X";

            hit.style.left=(sx+20)+"px";
            hit.style.top=(sy+20)+"px";

            game.appendChild(hit);

            setTimeout(()=>{
                hit.remove();
            },400);

            e.el.remove();

            enemies.splice(i,1);

            if(enemies.length===0){

                round++;

                roundEl.innerText=round;

                flashMessage("ROUND "+round);

                setTimeout(wave,1200);
            }

            break;
        }
    }
}

document.addEventListener("mousemove",e=>{

    const relX=e.clientX/window.innerWidth;
    const relY=e.clientY/window.innerHeight;

    targetCamX=(relX-0.5)*WORLD*0.85+WORLD/2;

    /* HYBANI DOLU */
    targetCamY=(relY-0.5)*700;
});

document.addEventListener("click",shoot);

document.addEventListener("keydown",e=>{

    if(e.key==="r" || e.key==="R"){

        reload();
    }
});

function loop(){

    requestAnimationFrame(loop);

    camX+=(targetCamX-camX)*0.08;
    camY+=(targetCamY-camY)*0.08;

    camY=Math.max(-350,Math.min(350,camY));

    drawBackground();

    updateEnemies();
}

wave();

loop();
</script>

</body>
</html>
