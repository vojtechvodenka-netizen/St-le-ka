<script>
const game=document.getElementById('game');
const canvas=document.getElementById('bg');
const C=canvas.getContext('2d');
const gunWrap=document.getElementById('gun-wrap');
const mflash=document.getElementById('mflash');
const sv=document.getElementById('sv'),hv=document.getElementById('hv'),rv=document.getElementById('rv');
const an=document.getElementById('an'),pips=document.getElementById('ammo-pips'),rh=document.getElementById('reload-hint');
const msgEl=document.getElementById('msg'),bannerEl=document.getElementById('banner');

let score=0,hits=0,ammo=30,MAX=30,round=1,reloading=false;

/* VETSI ROZSAH KAMERY */
let camX=1500,camY=0,targetCamX=1500,targetCamY=0;

const WORLD=3000;
const targets=[];
const TREES=[90,310,570,820,1100,1380,1640,1900,2170,2440,2720,2940];

function GW(){return game.offsetWidth;}
function GH(){return game.offsetHeight;}
function w2s(wx,wy){return[GW()/2+(wx-camX),GH()/2+(wy-camY)];}

function resize(){
  canvas.width=GW();
  canvas.height=GH();
}
resize();

window.addEventListener('resize',()=>{resize();});

function drawBg(){
  const gw=canvas.width,gh=canvas.height,hz=gh*0.44;

  C.clearRect(0,0,gw,gh);

  C.fillStyle='#090e06';
  C.fillRect(0,0,gw,hz);

  C.fillStyle='#172b0c';
  C.fillRect(0,hz,gw,gh*0.14);

  C.fillStyle='#0e1806';
  C.fillRect(0,hz+gh*0.14,gw,gh);

  for(let i=0;i<8;i++){
    const sx=((camX*0.015+i*160)%gw+gw)%gw;

    C.fillStyle='rgba(255,255,210,0.5)';
    C.beginPath();
    C.arc(sx,gh*0.1,1.4,0,6.28);
    C.fill();
  }

  TREES.forEach(tx=>{
    const[sx]=w2s(tx,0);

    if(sx<-90||sx>gw+90)return;

    C.fillStyle='#2c1908';
    C.fillRect(sx-10,hz-8,20,105);

    C.fillStyle='#152e05';
    C.beginPath();
    C.moveTo(sx-30,hz+2);
    C.lineTo(sx,hz-82);
    C.lineTo(sx+30,hz+2);
    C.fill();
  });
}

function soldierSVG(hp,mhp){
  return `
  <svg width="50" height="100" viewBox="0 0 50 100">
    <rect x="15" y="20" width="20" height="40" fill="#4a5a3a"/>
    <circle cx="25" cy="15" r="10" fill="#c8956c"/>
  </svg>`;
}

function shieldSVG(hp,mhp){
  return `
  <svg width="58" height="78" viewBox="0 0 58 78">
    <rect x="10" y="10" width="38" height="58" rx="8" fill="#3a8aee"/>
  </svg>`;
}

function buildPips(){
  pips.innerHTML='';

  for(let i=0;i<MAX;i++){
    const d=document.createElement('div');
    d.className='pip'+(i>=ammo?' spent':'');
    pips.appendChild(d);
  }

  an.textContent=ammo;
  rh.style.display=ammo===0?'block':'none';
}

function spawn(){

  const isS=Math.random()<0.35;

  const w=isS?58:50;
  const h=isS?78:100;

  const mhp=isS?(2+Math.min(round-1,2)):(1+Math.min(round-1,2));

  const el=document.createElement('div');

  el.className='target';

  const wx=60+Math.random()*(WORLD-120);

  /* ENEMY MUZOU I DOLU */
  const wy=(Math.random()*600)-150;

  el.style.cssText=`
    position:absolute;
    animation:bob ${1.4+Math.random()*0.8}s ease-in-out infinite;
  `;

  el.innerHTML=isS?shieldSVG(mhp,mhp):soldierSVG(mhp,mhp);

  game.insertBefore(el,gunWrap);

  const d={
    isS,
    w,
    h,
    hp:mhp,
    mhp,
    el,
    wx,
    wy,
    pts:(isS?5:12)*round
  };

  targets.push(d);

  posT(d);
}

function posT(t){
  const[sx,sy]=w2s(t.wx,t.wy);

  t.el.style.left=sx+'px';
  t.el.style.top=sy+'px';

  t.el.style.display=
    (sx>-80&&sx<GW()+80&&sy>-130&&sy<GH()+130)
    ?'block'
    :'none';
}

function allPos(){
  targets.forEach(posT);
}

function fireGun(){

  gunWrap.style.animation='none';
  void gunWrap.offsetWidth;

  gunWrap.style.animation='recoil 0.2s ease-out forwards';

  mflash.style.animation='none';
  void mflash.offsetWidth;

  mflash.style.animation='mflash 0.14s ease-out forwards';
}

function shoot(){

  if(reloading)return;

  if(ammo<=0)return;

  ammo--;

  buildPips();

  fireGun();

  const cx=GW()/2;
  const cy=GH()/2;

  for(let i=targets.length-1;i>=0;i--){

    const t=targets[i];

    const[sx,sy]=w2s(t.wx,t.wy);

    if(cx>=sx&&cx<=sx+t.w&&cy>=sy&&cy<=sy+t.h){

      t.hp--;

      if(t.hp<=0){

        t.el.remove();

        targets.splice(i,1);

        score+=t.pts;

        sv.textContent=score;
      }

      break;
    }
  }
}

function doReload(){

  if(reloading||ammo===MAX)return;

  reloading=true;

  setTimeout(()=>{
    ammo=MAX;
    reloading=false;
    buildPips();
  },1500);
}

function wave(){
  const n=5;

  for(let i=0;i<n;i++){
    setTimeout(spawn,i*250);
  }
}

/* TED MUZES HYBAT I DOLU */
game.addEventListener('mousemove',e=>{

  const r=game.getBoundingClientRect();

  const relX=(e.clientX-r.left)/r.width;
  const relY=(e.clientY-r.top)/r.height;

  targetCamX=(relX-0.5)*WORLD*0.85+WORLD/2;

  /* VELKY VERTIKALNI POHYB */
  targetCamY=(relY-0.5)*600;
});

game.addEventListener('click',shoot);

document.addEventListener('keydown',e=>{
  if(e.key==='r'||e.key==='R')doReload();
});

buildPips();
wave();

let last=0;

function loop(ts){

  requestAnimationFrame(loop);

  const dt=Math.min((ts-last)/16,3);

  last=ts;

  camX+=(targetCamX-camX)*0.1*dt;
  camY+=(targetCamY-camY)*0.1*dt;

  camX=Math.max(0,Math.min(WORLD,camX));

  /* POVOLENI POHYBU DOLU */
  camY=Math.max(-300,Math.min(300,camY));

  drawBg();

  allPos();
}

requestAnimationFrame(loop);
</script>
